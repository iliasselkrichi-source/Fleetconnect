<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleetconnect | Orders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            font-family: 'Inter', system-ui, sans-serif;
            background: #f4f6fa;
            min-height: 100vh;
        }
        .sidebar {
            width: 220px;
            background: #ffffff;
            border-right: 1px solid #e9edf2;
            display: flex;
            flex-direction: column;
            padding-top: 32px;
        }
        .menu-item {
            background: #f3f4f6;
            color: #1f2b48;
            padding: 14px 16px;
            margin: 8px 16px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #e5e7eb;
        }
        .menu-item.active {
            background: #1f2b48;
            color: white;
            border-color: #1f2b48;
        }
        .menu-item:hover:not(.active) {
            background: #e5e7eb;
        }
        .main {
            flex: 1;
            padding: 28px 32px;
            background: #f4f6fa;
            overflow-y: auto;
        }
        h2 {
            font-size: 26px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 28px;
        }
        .table-container {
            background: #ffffff;
            border-radius: 28px;
            overflow-x: auto;
            border: 1px solid #edf2f7;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th {
            background: #fafcff;
            padding: 18px 12px;
            font-weight: 600;
            font-size: 13px;
            color: #4a5b6e;
            border-bottom: 1.5px solid #eef3fc;
            text-align: left;
        }
        td {
            padding: 14px 12px;
            font-size: 13px;
            color: #1f2a44;
            border-bottom: 1px solid #f0f4fa;
            vertical-align: middle;
        }
        .fiche-icon {
            font-size: 28px;
            cursor: pointer;
            text-align: center;
        }
        .empty-row td {
            text-align: center;
            color: #94a3b8;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 32px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
            border-bottom: 2px solid #eef2ff;
            padding-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .modal-header h3 {
            font-size: 24px;
        }
        .created-info {
            font-size: 13px;
            color: #6b7280;
            background: #f3f4f6;
            padding: 6px 12px;
            border-radius: 40px;
        }
        .close {
            cursor: pointer;
            font-size: 32px;
            font-weight: bold;
            margin-left: auto;
        }
        .fiche-field {
            margin: 14px 0;
            padding: 10px 0;
            border-bottom: 1px solid #f0f4fa;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .fiche-label {
            font-weight: 700;
            color: #1f2b48;
            width: 130px;
        }
        .fiche-value {
            flex: 1;
            color: #1f2a44;
        }
        .confirm-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            width: 100%;
        }
        .confirm-btn:hover { background: #059669; }
        @media (max-width: 720px) {
            .sidebar { width: 160px; }
            .menu-item { font-size: 13px; }
            .main { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="menu-item active" data-tab="pending">📋 NEW ORDERS</div>
    <div class="menu-item" data-tab="confirmed">✅ CONFIRMED ORDERS</div>
</div>

<div class="main">
    <h2 id="page-title">New Orders</h2>
    <div class="table-container">
        <div id="table-wrapper"></div>
    </div>
</div>

<div id="ficheModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📋 Complete fiche</h3>
            <div class="created-info" id="createdInfo"></div>
            <span class="close">&times;</span>
        </div>
        <div id="modal-fiche-content"></div>
        <div style="margin-top: 24px;" id="modal-action-btn"></div>
    </div>
</div>

<script>
    // ========== SUPABASE CONFIGURATIE ==========
    const SUPABASE_URL = 'https://kwsuqzbqzsmgkjaslwkz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3c3VxemJxenNtZ2tqYXNsd2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTUwMDQsImV4cCI6MjA5MjY5MTAwNH0.DBgx2oq0LbXwUlPQv3cmYMvGEjYA6bhy-2hejvgtERE';
    // =============================================
    
    let currentTab = 'pending';
    let currentBookingId = null;
    let currentBookingStatus = null;

    async function updateBookingStatus(id, newStatus) {
        const url = `${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}`;
        const response = await fetch(url, {
            method: 'PATCH',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ status: newStatus })
        });
        if (!response.ok) throw new Error('Update mislukt');
        return true;
    }

    function showFiche(booking, sourceTab) {
        currentBookingId = booking.id;
        currentBookingStatus = booking.status;
        
        document.getElementById('createdInfo').innerHTML = `🕒 Aangemaakt: ${new Date(booking.created_at).toLocaleString()}`;
        
        const modalContent = document.getElementById('modal-fiche-content');
        modalContent.innerHTML = `
            <div class="fiche-field"><span class="fiche-label">Prefix:</span><span class="fiche-value">${booking.id}</span></div>
            <div class="fiche-field"><span class="fiche-label">Datum / Tijd:</span><span class="fiche-value">${booking.datetime} — ${booking.time}</span></div>
            <div class="fiche-field"><span class="fiche-label">Naam:</span><span class="fiche-value">${booking.name}</span></div>
            <div class="fiche-field"><span class="fiche-label">Contact:</span><span class="fiche-value">${booking.email} — ${booking.phone}</span></div>
            <div class="fiche-field"><span class="fiche-label">Traject:</span><span class="fiche-value">${booking.pickup} → ${booking.destination}</span></div>
            <div class="fiche-field"><span class="fiche-label">Voertuig:</span><span class="fiche-value">${booking.vehicle}</span></div>
            <div class="fiche-field"><span class="fiche-label">Extras:</span><span class="fiche-value">${booking.extras || 'Geen'}</span></div>
            <div class="fiche-field"><span class="fiche-label">Bedrag / Betaling:</span><span class="fiche-value">€${parseFloat(booking.amount).toFixed(2)} — ${booking.payment}</span></div>
            <div class="fiche-field"><span class="fiche-label">Status:</span><span class="fiche-value">${booking.status}</span></div>
        `;
        
        const actionBtnDiv = document.getElementById('modal-action-btn');
        if (sourceTab === 'pending') {
            actionBtnDiv.innerHTML = `<button id="bevestigOrderBtn" class="confirm-btn">✅ Bevestig order → verplaats naar confirmed</button>`;
            document.getElementById('bevestigOrderBtn').onclick = async () => {
                try {
                    await updateBookingStatus(currentBookingId, 'confirmed');
                    document.getElementById('ficheModal').style.display = 'none';
                    loadCurrentTab();
                    alert('Order bevestigd! Staat nu in Confirmed Orders.');
                } catch (err) {
                    alert('Fout: ' + err.message);
                }
            };
        } else {
            actionBtnDiv.innerHTML = '';
        }
        
        document.getElementById('ficheModal').style.display = 'flex';
    }

    function renderTable(orders, tabType) {
        let html = `
            <table>
                <thead>
                    <tr><th>PREFIX</th><th>DATUM</th><th>TIJD</th><th>NAAM</th><th>TRAJECT</th><th>ACTIE</th></tr>
                </thead>
                <tbody>
        `;
        
        if (orders && orders.length > 0) {
            for (const o of orders) {
                html += `
                    <tr>
                        <td><strong>${o.id}</strong></td>
                        <td>${o.datetime}</td>
                        <td>${o.time}</td>
                        <td>${o.name}</td>
                        <td>${o.pickup} → ${o.destination}</td>
                        <td class="fiche-icon" onclick='showFiche(${JSON.stringify(o).replace(/'/g, "&#39;")}, "${tabType}")'>📄</td>
                    </tr>
                `;
            }
        } else {
            html += `<tr class="empty-row"><td colspan="6">⚠️ Geen ${tabType === 'pending' ? 'pending' : 'confirmed'} orders</td></tr>`;
        }
        
        const currentCount = orders ? orders.length : 0;
        const emptyNeeded = Math.max(0, 5 - currentCount);
        for (let i = 0; i < emptyNeeded; i++) {
            html += `<tr class="empty-row"><td colspan="6">⏳ — vrije regel —</td></tr>`;
        }
        
        html += `</tbody>
        </table>`;
        return html;
    }

    async function loadPendingOrders() {
        const url = `${SUPABASE_URL}/rest/v1/bookings?status=eq.pending&order=created_at.desc`;
        const res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
        const orders = await res.json();
        return orders;
    }
    
    async function loadConfirmedOrders() {
        const url = `${SUPABASE_URL}/rest/v1/bookings?status=eq.confirmed&order=created_at.desc`;
        const res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
        const orders = await res.json();
        return orders;
    }
    
    async function loadCurrentTab() {
        const wrapper = document.getElementById('table-wrapper');
        const title = document.getElementById('page-title');
        if (currentTab === 'pending') {
            title.innerText = '📋 New Orders (Pending)';
            const orders = await loadPendingOrders();
            wrapper.innerHTML = renderTable(orders, 'pending');
        } else {
            title.innerText = '✅ Confirmed Orders';
            const orders = await loadConfirmedOrders();
            wrapper.innerHTML = renderTable(orders, 'confirmed');
        }
    }

    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            item.classList.add('active');
            currentTab = item.getAttribute('data-tab');
            loadCurrentTab();
        });
    });
    
    document.querySelector('.close').onclick = () => document.getElementById('ficheModal').style.display = 'none';
    window.onclick = (e) => { if (e.target === document.getElementById('ficheModal')) document.getElementById('ficheModal').style.display = 'none'; };
    
    loadCurrentTab();
    setInterval(loadCurrentTab, 10000);
</script>
</body>
</html>
