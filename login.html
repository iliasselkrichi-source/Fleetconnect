<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleetconnect Admin Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            max-width: 400px;
            width: 100%;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }
        p {
            color: #64748b;
            margin-bottom: 28px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #2dd4bf;
            box-shadow: 0 0 0 2px rgba(45,212,191,0.2);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 16px;
            transition: background 0.2s;
        }
        button:hover {
            background: #2dd4bf;
            color: #0f172a;
        }
        .error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 16px;
        }
        .success {
            color: #10b981;
            font-size: 14px;
            margin-top: 16px;
        }
        .info {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h1>🔐 Fleetconnect Admin</h1>
    <p>Log in met je Supabase account</p>
    <input type="email" id="email" placeholder="E-mailadres" autocomplete="off">
    <input type="password" id="password" placeholder="Wachtwoord">
    <button id="loginBtn">Inloggen</button>
    <div id="message"></div>
    <div class="info">Demo: ryzen@fleetconnect.com / iliassiliass</div>
</div>

<script>
    // ============================================
    // JUISTE SUPABASE INITIALISATIE (CDN UMD)
    // ============================================
    const { createClient } = supabase;
    
    const supabaseClient = createClient(
        'https://kwsuqzbqzsmgkjaslwkz.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3c3VxemJxenNtZ2tqYXNsd2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTUwMDQsImV4cCI6MjA5MjY5MTAwNH0.DBgx2oq0LbXwUlPQv3cmYMvGEjYA6bhy-2hejvgtERE'
    );

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const messageDiv = document.getElementById('message');

    // Helper: wacht tot de sessie in localStorage staat
    async function waitForSession(maxAttempts = 20, interval = 200) {
        for (let i = 0; i < maxAttempts; i++) {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                console.log('✅ Sessie gevonden in localStorage');
                return true;
            }
            await new Promise(resolve => setTimeout(resolve, interval));
        }
        return false;
    }

    async function handleLogin() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        messageDiv.innerHTML = '';
        
        if (!email || !password) {
            messageDiv.innerHTML = '<div class="error">Vul e-mail en wachtwoord in</div>';
            return;
        }
        
        loginBtn.disabled = true;
        loginBtn.innerText = 'Bezig met inloggen...';
        
        try {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) {
                console.error('Login error:', error);
                messageDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
                loginBtn.disabled = false;
                loginBtn.innerText = 'Inloggen';
                return;
            }
            
            console.log('✅ Ingelogd als:', data.user.email);
            messageDiv.innerHTML = '<div class="success">✅ Succes! Bezig met doorverwijzen...</div>';
            
            // Wacht tot de sessie daadwerkelijk is opgeslagen
            const sessionReady = await waitForSession();
            if (!sessionReady) {
                console.warn('⚠️ Sessie niet gevonden na timeout, alsnog doorverwijzen');
            }
            
            // Extra vertraging om zeker te zijn dat localStorage is bijgewerkt
            setTimeout(() => {
                window.location.href = 'admin_panel.html?t=' + Date.now();
            }, 300);
            
        } catch (err) {
            console.error('Unexpected error:', err);
            messageDiv.innerHTML = '<div class="error">❌ Onverwachte fout, probeer opnieuw</div>';
            loginBtn.disabled = false;
            loginBtn.innerText = 'Inloggen';
        }
    }
    
    loginBtn.addEventListener('click', handleLogin);
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
    emailInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
