<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Fleetconnect</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f1f5f9;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 360px;
            text-align: center;
        }
        h1 { font-size: 28px; margin-bottom: 8px; color: #0f172a; }
        h1 i { color: #2dd4bf; }
        p { color: #64748b; margin-bottom: 24px; }
        input {
            width: 100%;
            padding: 14px 20px;
            margin: 12px 0;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 12px;
        }
        button:hover {
            background: #2dd4bf;
            color: #0f172a;
        }
        .error { color: #ef4444; margin-top: 16px; font-size: 14px; }
        .success { color: #10b981; margin-top: 16px; font-size: 14px; }
    </style>
</head>
<body>
<div class="login-box">
    <h1><i class="fas fa-truck"></i> Fleetconnect Admin</h1>
    <p>Log in om het dashboard te openen</p>
    <input type="email" id="email" placeholder="E-mailadres">
    <input type="password" id="password" placeholder="Wachtwoord">
    <button onclick="login()">Inloggen</button>
    <div id="message"></div>
</div>

<script>
    const SUPABASE_URL = 'https://kwsuqzbqzsmgkjaslwkz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3c3VxemJxenNtZ2tqYXNsd2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTUwMDQsImV4cCI6MjA5MjY5MTAwNH0.DBgx2oq0LbXwUlPQv3cmYMvGEjYA6bhy-2hejvgtERE';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');
        const btn = document.querySelector('button');
        
        messageDiv.innerHTML = '';
        
        if (!email || !password) {
            messageDiv.innerHTML = '<span class="error">Vul e-mail en wachtwoord in</span>';
            return;
        }
        
        btn.disabled = true;
        btn.innerText = 'Bezig...';
        
        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password
        });
        
        btn.disabled = false;
        btn.innerText = 'Inloggen';
        
        if (error) {
            messageDiv.innerHTML = '<span class="error">Fout: ' + error.message + '</span>';
        } else {
            messageDiv.innerHTML = '<span class="success">✅ Succes! Doorverwijzen...</span>';
            window.location.href = 'admin_panel.html';
        }
    }
    
    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
