<head>

    <style>

        body { font-family: 'Inter', sans-serif; background: #f1f5f9; height: 100vh; display: flex; }
        .sidebar { width: 260px; background: #0f172a; color: #e2e8f0; overflow-y: auto; }

        .delete-btn { background: #ef4444; color: white; margin-left: 8px; }

        <div class="modal-content">

            <div class="fiche-body" id="ficheBody"></div>
        </div>

    <script>
        // ============================================
        // 0. SUPABASE CONFIGURATIE
        // ============================================
        const SUPABASE_URL = 'https://kwsuqzbqzsmgkjaslwkz.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_5hdl73a9-jNd9n3lnsYVyQ_dMYgiSLA';
        let supabaseClient = null;
        let supabaseConnected = false;

        async function initSupabase() {
            try {
                const { createClient } = supabaseJs;
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data, error } = await supabaseClient.from('bookings').select('count', { count: 'exact', head: true });
                if (!error) {
                    supabaseConnected = true;
                    console.log('Supabase connected successfully');
                } else {
                    supabaseConnected = false;
                }
            } catch (e) {
                supabaseConnected = false;
                console.error('Failed to initialize Supabase:', e);
            }
        }

        async function laadPendingOrders() {
            if (!supabaseClient) return;
            const { data, error } = await supabaseClient
                .from('bookings')
                .select('*')
                .eq('status', 'pending');
            if (!error && data) rawNewOrders = data;
        }

        // ============================================
        // 1. CONFIGURATIE & HUIDIGE TIJD
        // ============================================
        const NOW = new Date(2026, 3, 26, 9, 18);

        function formatCurrentTime() {
            const dagen = ['Zondag', 'Maandag', 'Dinsdag', 'Woensdag', 'Donderdag', 'Vrijdag', 'Zaterdag'];
            const dag = dagen[NOW.getDay()];
            const datum = `${NOW.getDate().toString().padStart(2,'0')}-${(NOW.getMonth()+1).toString().padStart(2,'0')}-${NOW.getFullYear()}`;
            const tijd = `${NOW.getHours().toString().padStart(2,'0')}:${NOW.getMinutes().toString().padStart(2,'0')}`;
            return `${dag} ${datum} om ${tijd} uur`;
        }

        // ============================================
        // 2. DATUM & TIJD HELPER FUNCTIES
        // ============================================
        function parseDateTime(dateStr, timeStr) {
            const parts = dateStr.split('-');
            const timeParts = timeStr ? timeStr.split(':') : ['00', '00'];

        function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();

            const firstDayOfMonth = new Date(year, month, 1);
            const startDay = firstDayOfMonth.getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const prevMonthDays = new Date(year, month, 0).getDate();

            let calendarHTML = `
                <div class="calendar-container">
                    <div class="calendar-header">
                        <h2>${firstDayOfMonth.toLocaleDateString('nl-NL', { month: 'long', year: 'numeric' })}</h2>
                        <div class="calendar-nav">
                            <button onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>

                        </div>
                    </div>
                    <div class="calendar-weekdays">
                        <div>Ma</div><div>Di</div><div>Wo</div><div>Do</div><div>Vr</div><div>Za</div><div>Zo</div>
                    </div>
                    <div class="calendar-days">
            `;

            let adjustedStartDay = startDay === 0 ? 6 : startDay - 1;

            for (let i = adjustedStartDay - 1; i >= 0; i--) {
                const day = prevMonthDays - i;
                const dateStr = `${day.toString().padStart(2,'0')}-${(month).toString().padStart(2,'0')}-${year}`;
                calendarHTML += `<div class="calendar-day other-month" data-date="${dateStr}" onclick="selectDateByString('${dateStr}')">${day}</div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${day.toString().padStart(2,'0')}-${(month+1).toString().padStart(2,'0')}-${year}`;
                const hasRides = getRidesByDate(dateStr).length > 0;
                const isToday = (day === NOW.getDate() && month === NOW.getMonth() && year === NOW.getFullYear());
                const isSelected = (selectedDate && day === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear());

                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                if (hasRides) classes += ' has-rides';

                calendarHTML += `<div class="${classes}" data-date="${dateStr}" onclick="selectDateByString('${dateStr}')">
                    ${day}
                    ${hasRides ? '<div class="ride-dot"></div>' : ''}
                </div>`;
            }

            const remainingDays = 42 - (adjustedStartDay + daysInMonth);
            for (let day = 1; day <= remainingDays; day++) {
                const dateStr = `${day.toString().padStart(2,'0')}-${(month+2).toString().padStart(2,'0')}-${year}`;
                calendarHTML += `<div class="calendar-day other-month" data-date="${dateStr}" onclick="selectDateByString('${dateStr}')">${day}</div>`;
            }

            calendarHTML += `</div></div>`;
            return calendarHTML;
        }

        // ============================================
        // 10. FINANCIËLE BEREKENINGEN
        // ============================================
        function getDateRange() {
            let startDate, endDate;
            const today = new Date(NOW);

            if (financePeriod === 'day') {
                startDate = new Date(today);
                startDate.setHours(0, 0, 0, 0);
                endDate = new Date(today);
                endDate.setHours(23, 59, 59, 999);
            } else if (financePeriod === 'week') {
                startDate = new Date(today);
                startDate.setDate(today.getDate() - today.getDay() + (today.getDay() === 0 ? -6 : 1));
                startDate.setHours(0, 0, 0, 0);
                endDate = new Date(startDate);
                endDate.setDate(startDate.getDate() + 6);
                endDate.setHours(23, 59, 59, 999);
            } else if (financePeriod === 'month') {
                startDate = new Date(today.getFullYear(), today.getMonth(), 1);
                endDate = new Date(today.getFullYear(), today.getMonth() + 1, 0);
                endDate.setHours(23, 59, 59, 999);
            } else if (financePeriod === 'year') {
                startDate = new Date(today.getFullYear(), 0, 1);
                endDate = new Date(today.getFullYear(), 11, 31);
                endDate.setHours(23, 59, 59, 999);
            } else if (financePeriod === 'custom' && customStartDate && customEndDate) {
                startDate = new Date(customStartDate);
                startDate.setHours(0, 0, 0, 0);
                endDate = new Date(customEndDate);
                endDate.setHours(23, 59, 59, 999);
            }
            return { startDate, endDate };
        }

        function getAllBookingsForFinance() {
            return [...newOrders, ...ordersList, ...historyOrders];
        }

        function getBookingsInRange(startDate, endDate) {
            return getAllBookingsForFinance().filter(booking => {
                const bookingDate = parseDateTime(booking.datetime, "00:00");
                return bookingDate >= startDate && bookingDate <= endDate;
            });
        }

        function getPreviousPeriodData() {
            const { startDate, endDate } = getDateRange();
            const duration = endDate - startDate;
            const prevStartDate = new Date(startDate - duration - 86400000);
            const prevEndDate = new Date(startDate - 86400000);
            const bookings = getBookingsInRange(prevStartDate, prevEndDate);
            const total = bookings.reduce((sum, b) => sum + (b.amount || 0), 0);
            const cash = bookings.filter(b => b.payment === 'Cash').reduce((sum, b) => sum + (b.amount || 0), 0);
            const factuur = bookings.filter(b => b.payment === 'Factuur').reduce((sum, b) => sum + (b.amount || 0), 0);
            return { total, cash, factuur, count: bookings.length };
        }

        function getFinanceStatistics() {
            const { startDate, endDate } = getDateRange();
            const bookings = getBookingsInRange(startDate, endDate);

            const total = bookings.reduce((sum, b) => sum + (b.amount || 0), 0);
            const cash = bookings.filter(b => b.payment === 'Cash').reduce((sum, b) => sum + (b.amount || 0), 0);
            const factuur = bookings.filter(b => b.payment === 'Factuur').reduce((sum, b) => sum + (b.amount || 0), 0);
            const commission = total * 0.10;
            const netRevenue = total - commission;

            const byTemplate = { T1: 0, T2: 0, T3: 0, T4: 0, T5: 0 };
            bookings.forEach(b => { if (byTemplate[b.template] !== undefined) byTemplate[b.template] += (b.amount || 0); });

            const avgOrderValue = bookings.length > 0 ? total / bookings.length : 0;
            const cashPercentage = total > 0 ? (cash / total) * 100 : 0;
            const factuurPercentage = total > 0 ? (factuur / total) * 100 : 0;

            return { total, cash, factuur, commission, netRevenue, byTemplate, avgOrderValue, cashPercentage, factuurPercentage, count: bookings.length };
        }

        function getChartData() {
            const { startDate, endDate } = getDateRange();
            const days = [];
            const totals = [];
            const cashData = [];
            const factuurData = [];

            let current = new Date(startDate);
            while (current <= endDate) {
                const dateStr = `${current.getDate().toString().padStart(2,'0')}-${(current.getMonth()+1).toString().padStart(2,'0')}-${current.getFullYear()}`;
                const dayBookings = getAllBookingsForFinance().filter(b => b.datetime === dateStr);
                const dayTotal = dayBookings.reduce((sum, b) => sum + (b.amount || 0), 0);
                const dayCash = dayBookings.filter(b => b.payment === 'Cash').reduce((sum, b) => sum + (b.amount || 0), 0);
                const dayFactuur = dayBookings.filter(b => b.payment === 'Factuur').reduce((sum, b) => sum + (b.amount || 0), 0);

                days.push(dateStr);
                totals.push(dayTotal);
                cashData.push(dayCash);
                factuurData.push(dayFactuur);

                current.setDate(current.getDate() + 1);
            }

            return { days, totals, cashData, factuurData };
        }

        // ============================================
        // 11. ONDERAANNEMERS STATISTIEKEN
        // ============================================
        function getOnderaannemerStats() {
            return onderaannemersList.map(oa => {
                const oaDrivers = driversList.filter(d => d.onderaannemerId === oa.id);
                const oaRides = allRides.filter(ride => {
                    return ride.driver && oaDrivers.some(d => d.id === ride.driver.id);
                });
                const totalRevenue = oaRides.reduce((sum, r) => sum + (r.amount || 0), 0);
                const rideCount = oaRides.length;
                const cashRevenue = oaRides.filter(r => r.payment === 'Cash').reduce((sum, r) => sum + (r.amount || 0), 0);
                const factuurRevenue = oaRides.filter(r => r.payment === 'Factuur').reduce((sum, r) => sum + (r.amount || 0), 0);
                return { ...oa, driverCount: oaDrivers.length, totalRevenue, rideCount, cashRevenue, factuurRevenue };
            });
        }

        function exportFinanceCSV() {
            const { startDate, endDate } = getDateRange();
            const bookings = getBookingsInRange(startDate, endDate);
            const headers = ["ID", "Template", "Datum", "Tijd", "Klant", "Route", "Voertuig", "Bedrag", "Betaling", "Status"];
            const rows = bookings.map(b => [b.id, b.template || '', b.datetime, b.time || '', b.name, `${b.pickup || ''} → ${b.destination || ''}`, b.vehicle, b.amount, b.payment, b.completed ? 'Uitgevoerd' : (b.canceled ? 'Geannuleerd' : 'Bevestigd')]);
            const csvContent = [headers, ...rows].map(row => row.map(cell => `"${cell}"`).join(",")).join("\n");
            const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `fleet_finance_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.csv`;
            link.click();
        }

        function exportFinanceJSON() {

            const exportData = { period: { start: startDate, end: endDate }, statistics: stats, bookings: bookings, onderaannemers: onderaannemerStats };
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `fleet_finance_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;

        function confirmOrder(orderId) {
            const orderIndex = rawNewOrders.findIndex(order => order.id === orderId);
            if (orderIndex !== -1) {
                const confirmedOrder = { ...rawNewOrders[orderIndex], status: "confirmed", completed: false, canceled: false };
                rawNewOrders.splice(orderIndex, 1);
                rawConfirmedOrders.push(confirmedOrder);
                updateAgendaData();
                filterAndSortData();
                if (currentTab === 'neworders') renderNewOrders();
                if (currentTab === 'orders') renderOrders();
                if (currentTab === 'history') renderHistory();
                refreshAgenda();
                alert(`Order ${orderId} is bevestigd.`);
                closeModal();
            }
        }

        function confirmAssignDriver(orderId) {
            if (!selectedDriverId) { alert("Selecteer eerst een chauffeur."); return; }
            const order = ordersList.find(o => o.id === orderId);
            const driver = driversList.find(d => d.id === selectedDriverId);
            if (order && driver) {
                order.assignedDriver = driver;
                const rawOrder = rawConfirmedOrders.find(o => o.id === orderId);
                if (rawOrder) rawOrder.assignedDriver = driver;
                updateAgendaData();
                if (currentTab === 'orders') renderOrders();
                alert(`Chauffeur ${driver.name} toegewezen.`);
                closeModal();
            }
        }

                            <li>💡 Klik op de flipcard in Agenda om toekomstige ritten te bekijken</li>
                            <li>💡 Exporteer financiële data naar PDF voor rapportages</li>

            `;
        }

        // ============================================
        // 18. ONDERAANNEMER FUNCTIES
        // ============================================
        function addDriverToSubcontractor(onderaannemerId) {
            const onderaannemer = onderaannemersList.find(o => o.id === onderaannemerId);
            if (!onderaannemer) return;
            const name = prompt("Chauffeur naam:");
            if (!name) return;
            const phone = prompt("Telefoon:") || "Onbekend";
            const vehicle = prompt("Voertuig:") || "Onbekend";
            const plate = prompt("Nummerplaat:") || "Onbekend";
            const prefix = onderaannemer.name.substring(0, 3).toUpperCase();
            const nextNum = driversList.filter(d => d.id.startsWith(prefix)).length + 1;
            const newId = `${prefix}-${nextNum.toString().padStart(2, '0')}`;
            const newDriver = { id: newId, name: name, phone: phone, email: "", license: "B", vehicle: vehicle, plate: plate, onderaannemerId: onderaannemer.id, onderaannemerNaam: onderaannemer.name };
            driversList.push(newDriver);
            onderaannemer.drivers.push(newDriver);
            alert(`Chauffeur ${name} toegevoegd met ID ${newId}`);
            renderOnderaannemers();
            renderDrivers();
        }

        function addOnderaannemer() {
            const name = prompt("Naam:");
            if (!name) return;
            const contact = prompt("Contactpersoon:") || "Onbekend";
            const phone = prompt("Telefoon:") || "Onbekend";
            const email = prompt("Email:") || "Onbekend";
            const services = prompt("Diensten:") || "Onbekend";
            const newId = onderaannemersList.length + 1;
            onderaannemersList.push({ id: newId, name: name, contact: contact, phone: phone, email: email, services: services, drivers: [] });
            renderOnderaannemers();
        }

        function editOnderaannemer(id) {
            const oa = onderaannemersList.find(o => o.id === id);
            if (!oa) return;
            const newName = prompt("Nieuwe naam:", oa.name);
            if (newName) oa.name = newName;
            const newContact = prompt("Nieuwe contactpersoon:", oa.contact);
            if (newContact) oa.contact = newContact;
            const newPhone = prompt("Nieuw telefoon:", oa.phone);
            if (newPhone) oa.phone = newPhone;
            const newEmail = prompt("Nieuw email:", oa.email);
            if (newEmail) oa.email = newEmail;
            const newServices = prompt("Nieuwe diensten:", oa.services);
            if (newServices) oa.services = newServices;
            renderOnderaannemers();
        }

        function deleteOnderaannemer(id) {
            if (confirm("Verwijder deze onderaannemer?")) {
                const oa = onderaannemersList.find(o => o.id === id);
                if (oa && oa.drivers) {
                    driversList = driversList.filter(d => d.onderaannemerId !== id);
                }
                onderaannemersList = onderaannemersList.filter(o => o.id !== id);
                renderOnderaannemers();
                renderDrivers();
            }
        }

        // ============================================
        // 19. SWITCH TAB & DOWNLOAD FUNCTIES
        // ============================================
        function switchTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.getAttribute('data-tab') === tabName) item.classList.add('active');
                else item.classList.remove('active');
            });
            const downloadButtons = document.getElementById('downloadButtons');
            if (tabName === 'history') downloadButtons.classList.remove('hidden');
            else downloadButtons.classList.add('hidden');

            if (tabName === 'neworders') renderNewOrders();
            else if (tabName === 'orders') renderOrders();
            else if (tabName === 'history') renderHistory();
            else if (tabName === 'agenda') refreshAgenda();
            else if (tabName === 'drivers') renderDrivers();
            else if (tabName === 'onderaannemers') renderOnderaannemers();
            else if (tabName === 'financieel') renderFinance();
            else if (tabName === 'wiki') renderWiki();
        }

        function downloadCSV() {
            const data = historyOrders;
            const headers = ["ID", "Datum", "Tijd", "Klant", "Route", "Voertuig", "Bedrag", "Betaling"];
            const rows = data.map(o => [o.id, o.datetime, o.time, o.name, `${o.pickup || ''} → ${o.destination || ''}`, o.vehicle, o.amount, o.payment]);
            const csvContent = [headers, ...rows].map(row => row.join(";")).join("\n");
            const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `fleet_connect_history_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        function downloadJSON() {
            const blob = new Blob([JSON.stringify(historyOrders, null, 2)], { type: "application/json" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `fleet_connect_history_${new Date().toISOString().slice(0,10)}.json`;
            link.click();
        }

        // ============================================
        // 20. INITIALISATIE
        // ============================================
        async function init() {
            await initSupabase();
            await laadPendingOrders();
            filterAndSortData();
            updateAgendaData();
            refreshAgenda();

            setInterval(async function() {
                await laadPendingOrders();
                updateAgendaData();
                filterAndSortData();
                if (currentTab === 'agenda') refreshAgenda();
                else if (currentTab === 'orders') renderOrders();
                else if (currentTab === 'history') renderHistory();
                else if (currentTab === 'neworders') renderNewOrders();
                else if (currentTab === 'financieel') renderFinance();
            }, 60000);
        }

        init();
    </script>
