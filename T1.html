<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Orders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            font-family: 'Inter', system-ui, sans-serif;
            background: #f4f6fa;
            min-height: 100vh;
        }
        .sidebar {
            width: 200px;
            background: #ffffff;
            border-right: 1px solid #e9edf2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 32px;
        }
        .menu-item {
            background: linear-gradient(105deg, #eef2ff 0%, #ffffff 100%);
            color: #1f2b48;
            padding: 14px 16px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            border-radius: 60px;
            cursor: pointer;
            width: 140px;
            border: 1px solid #e0e7f0;
        }
        .main {
            flex: 1;
            padding: 28px 32px;
            background: #f4f6fa;
        }
        h2 {
            font-size: 26px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 28px;
        }
        .table-container {
            background: #ffffff;
            border-radius: 28px;
            overflow-x: auto;
            border: 1px solid #edf2f7;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }
        th {
            background: #fafcff;
            padding: 18px 12px;
            font-weight: 600;
            font-size: 13px;
            color: #4a5b6e;
            border-bottom: 1.5px solid #eef3fc;
            text-align: left;
        }
        td {
            padding: 14px 12px;
            font-size: 13px;
            color: #1f2a44;
            border-bottom: 1px solid #f0f4fa;
            vertical-align: top;
        }
        .fiche-cell {
            background: #fefce8;
            font-size: 11px;
            line-height: 1.4;
            min-width: 220px;
        }
        .fiche-content {
            background: #fff9e6;
            padding: 10px;
            border-radius: 12px;
            border-left: 3px solid #f59e0b;
        }
        .fiche-content p {
            margin: 4px 0;
        }
        .empty-row td {
            text-align: center;
            color: #94a3b8;
        }
        @media (max-width: 720px) {
            .sidebar { width: 160px; }
            .menu-item { width: 120px; font-size: 13px; }
            .main { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="menu-item">NEW ORDERS</div>
</div>

<div class="main">
    <h2>New Orders</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>PREFIX</th>
                    <th>DATUM</th>
                    <th>TIJD</th>
                    <th>NAAM</th>
                    <th>TRAJECT</th>
                    <th>ACTIE / FICHE</th>
                </tr>
            </thead>
            <tbody id="table-body">
            </tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://kwsuqzbqzsmgkjaslwkz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_5hdl73a9-jNd9n3lnsYVyQ_dMYgiSLA';

    function generateFiche(booking) {
        return `
            <div class="fiche-content">
                <p><strong>📞 Tel:</strong> ${booking.phone}</p>
                <p><strong>✉️ Email:</strong> ${booking.email}</p>
                <p><strong>🚗 Voertuig:</strong> ${booking.vehicle}</p>
                <p><strong>💰 €${booking.amount}</strong> / ${booking.payment}</p>
                <p><strong>➕ Extras:</strong> ${booking.extras || 'geen'}</p>
                <p><strong>🆔 ${booking.id}</strong></p>
                <p><strong>📍 Pickup:</strong> ${booking.pickup}</p>
                <p><strong>🏁 Destination:</strong> ${booking.destination}</p>
            </div>
        `;
    }

    function renderTable(orders) {
        const tbody = document.getElementById('table-body');
        let html = '';
        
        if (orders && orders.length > 0) {
            for (const o of orders) {
                const fiche = generateFiche(o);
                html += `
                    <tr>
                        <td><strong>${o.id}</strong></td>
                        <td>${o.datetime}</td>
                        <td>${o.time}</td>
                        <td>${o.name}</td>
                        <td>${o.pickup} → ${o.destination}</td>
                        <td class="fiche-cell">${fiche}</td>
                    </tr>
                `;
            }
        }
        
        const currentCount = orders ? orders.length : 0;
        const emptyNeeded = Math.max(0, 5 - currentCount);
        
        for (let i = 0; i < emptyNeeded; i++) {
            html += `<tr class="empty-row"><td colspan="6">⚠️ Geen order — wacht op nieuwe rit</td></tr>`;
        }
        
        tbody.innerHTML = html;
    }

    async function loadOrders() {
        try {
            const url = `${SUPABASE_URL}/rest/v1/bookings?status=eq.pending&order=created_at.desc`;
            const res = await fetch(url, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            });
            const orders = await res.json();
            renderTable(orders);
        } catch (err) {
            let errorHtml = '';
            for (let i = 0; i < 5; i++) {
                errorHtml += `<tr class="empty-row"><td colspan="6">❌ Fout: ${err.message}</td></tr>`;
            }
            document.getElementById('table-body').innerHTML = errorHtml;
        }
    }

    loadOrders();
    setInterval(loadOrders, 10000);
</script>
</body>
</html>
