        .mini-flip-back { background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%); color: #0f172a; transform: rotateY(180deg); }

        .flip-card { background-color: transparent; width: 100%; height: 400px; position: relative; }

        .planning-list { padding: 16px; }
        .planning-item { background: #f1f5f9; border-radius: 12px; padding: 12px; margin-bottom: 10px; border-left: 4px solid #2dd4bf; }
        .planning-time { font-weight: 700; color: #0f172a; margin-bottom: 4px; }
        .planning-ride { font-size: 0.85rem; color: #475569; }
        .empty-planning { text-align: center; padding: 40px; color: #94a3b8; }
        .finance-toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
        .period-buttons { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }

        canvas { max-height: 300px; width: 100% !important; }
        .export-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .export-btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; }
        .export-csv { background: #10b981; color: white; }
        .export-json { background: #3b82f6; color: white; }
        .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
        @media (max-width: 1000px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

        .kpi-card .value { font-size: 1.8rem; font-weight: 700; }
        .kpi-card .label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; margin-top: 8px; }
        .wiki-container { background: white; border-radius: 16px; padding: 24px; min-height: 400px; display: flex; align-items: center; justify-content: center; }
        .wiki-empty { text-align: center; color: #94a3b8; }
        .wiki-empty i { font-size: 4rem; margin-bottom: 16px; opacity: 0.5; }
        @media (max-width: 768px) { .sidebar { width: 220px; } .content { padding: 16px; } .flip-card { height: 500px; } }
        select, .assign-select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #e2e8f0; font-family: 'Inter', sans-serif; margin-top: 8px; }
        .assigned-driver { background: #d1fae5; padding: 10px; border-radius: 8px; margin-top: 8px; text-align: center; color: #065f46; font-weight: 500; }
    </style>
</head>
<body>

            </div>

                <div class="nav-item" data-tab="drivers" onclick="switchTab('drivers')"><i class="fas fa-id-card"></i> Drivers</div>

    <div class="main">
        <div class="header">
            <h1 id="pageTitle">Agenda</h1>
            <div class="header-right">
                <button class="refresh-btn" onclick="refreshAllData()"><i class="fas fa-sync-alt"></i> Vernieuwen</button>
                <span class="user-info" id="userEmail"></span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Uitloggen</button>
            </div>
            <div class="download-buttons hidden" id="downloadButtons">
                <button class="download-btn" onclick="downloadCSV()"><i class="fas fa-file-csv"></i> CSV</button>
                <button class="download-btn" onclick="downloadJSON()"><i class="fas fa-code"></i> JSON</button>
            </div>
        </div>
        <div class="content" id="contentArea"></div>
    </div>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <div class="fiche-header"><h3><i class="fas fa-file-invoice"></i> Boekingsfiche</h3><button class="close-modal" onclick="closeModal()">&times;</button></div>
            <div class="fiche-body" id="ficheBody"></div>
        </div>
    </div>

    <script>
        // ============================================
        // SUPABASE CONFIGURATIE
        // ============================================
        const SUPABASE_URL = 'https://kwsuqzbqzsmgkjaslwkz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3c3VxemJxenNtZ2tqYXNsd2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTUwMDQsImV4cCI6MjA5MjY5MTAwNH0.DBgx2oq0LbXwUlPQv3cmYMvGEjYA6bhy-2hejvgtERE';
        
        let supabaseClient = null;
        let currentUser = null;
        
        // Globale data
        let allBookings = [];
        let newOrders = [];
        let ordersList = [];
        let historyOrders = [];
        let driversList = [];
        let onderaannemersList = [];
        
        // Huidige tijd (gebruik echte huidige tijd)
        const NOW = new Date();
        
        // UI variabelen
        let currentTab = 'agenda';
        let selectedDate = new Date(NOW);
        let isFlipped = false;
        let currentMonth = new Date(NOW);
        let flipStates = { omzet: false, cash: false, orders: false };
        let financePeriod = 'month';
        let financeChart = null;
        let currentSelectedOrder = null;
        let selectedDriverId = null;

        // ============================================
        // AUTHENTICATIE - GECORRIGEERD
        // ============================================
        async function initSupabase() {
            try {
                // ** FIX 1: Gebruik de juiste globale variabele 'supabase' **
                const { createClient } = supabase;  // niet supabaseJs!
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                // ** FIX 2: Korte vertraging om sessie uit localStorage te laten laden **
                await new Promise(resolve => setTimeout(resolve, 200));
                
                // ** FIX 3: Haal sessie op met een extra fallback via onAuthStateChange **
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (!session) {
                    console.log('Geen actieve sessie gevonden, redirect naar login.');
                    window.location.href = 'login.html';
                    return;
                }
                
                currentUser = session.user;
                document.getElementById('userEmail').innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.email || 'Admin'}`;
                
                // ** FIX 4: Luister naar auth changes om uitloggen op te vangen **
                supabaseClient.auth.onAuthStateChange((event, newSession) => {
                    if (event === 'SIGNED_OUT') {
                        window.location.href = 'login.html';
                    }
                    if (event === 'SIGNED_IN' && newSession) {
                        currentUser = newSession.user;
                        document.getElementById('userEmail').innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.email || 'Admin'}`;
                    }
                });
                
                await loadBookingsFromSupabase();
                await loadDriversFromSupabase();
                
            } catch (e) {
                console.error('Failed to initialize:', e);
                window.location.href = 'login.html';
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            localStorage.removeItem('supabase_session');
            window.location.href = 'login.html';
        }

        // ============================================
        // DATA OPHALEN UIT SUPABASE
        // ============================================
        async function loadBookingsFromSupabase() {
            try {
                const { data, error } = await supabaseClient
                    .from('bookings')
                    .select('*')
                    .order('datetime', { ascending: false });
                
                if (error) throw error;
                
                allBookings = data || [];
                console.log(`✅ ${allBookings.length} boekingen geladen uit Supabase`);
                filterAndSortData();
                refreshCurrentTab();
            } catch (error) {
                console.error('Fout bij laden boekingen:', error);
                allBookings = [];
            }
        }

        async function loadDriversFromSupabase() {
            try {
                const { data, error } = await supabaseClient
                    .from('drivers')
                    .select('*');
                
                if (!error && data) {
                    driversList = data;
                }
            } catch (error) {
                console.error('Fout bij laden chauffeurs:', error);
                driversList = [];
            }
        }

        // ============================================
        // DATA BEWERKEN IN SUPABASE
        // ============================================
        async function updateBookingStatus(bookingId, newStatus, additionalData = {}) {
            try {
                const { error } = await supabaseClient
                    .from('bookings')
                    .update({ status: newStatus, ...additionalData })
                    .eq('id', bookingId);
                
                if (error) throw error;
                
                await loadBookingsFromSupabase();
                return true;
            } catch (error) {
                console.error('Fout bij updaten:', error);
                alert('Fout bij opslaan: ' + error.message);
                return false;
            }
        }

        async function assignDriverToBooking(bookingId, driverId) {
            const driver = driversList.find(d => d.id == driverId);
            if (!driver) return false;
            
            try {
                const { error } = await supabaseClient
                    .from('bookings')
                    .update({ assigned_driver: driver })
                    .eq('id', bookingId);
                
                if (error) throw error;
                
                await loadBookingsFromSupabase();
                return true;
            } catch (error) {
                console.error('Fout bij toewijzen chauffeur:', error);
                alert('Fout bij toewijzen: ' + error.message);
                return false;
            }
        }

        // ============================================
        // DATUM & TIJD FUNCTIES
        // ============================================
        function parseDateTime(dateStr, timeStr) {
            const parts = dateStr.split('-');
            const timeParts = timeStr ? timeStr.split(':') : ['00', '00'];
            return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]), parseInt(timeParts[0]), parseInt(timeParts[1]));
        }

        function isOrderInFuture(order) {
            // Zet datetime van DB (yyyy-mm-dd) om naar dd-mm-yyyy
            const dateStr = toDateKey(order.datetime);
            const orderDateTime = parseDateTime(dateStr, order.time);
            return orderDateTime > NOW;
        }

        // ============================================
        // DATA SORTEREN
        // ============================================
        function filterAndSortData() {
            // New Orders: status = 'pending' of 'new'
            newOrders = allBookings.filter(booking => 
                booking.status === 'pending' || booking.status === 'new'
            );

            // Orders: alleen 'confirmed' of 'active' die nog in de toekomst liggen
            ordersList = allBookings.filter(booking => 
                (booking.status === 'confirmed' || booking.status === 'active') &&
                isOrderInFuture(booking)
            );

            // History:
            // - 'completed' of 'cancelled' (zoals eerder)
            // - plus 'confirmed' of 'active' die NIET meer in de toekomst liggen (dus verleden)
            historyOrders = allBookings.filter(booking => 
                booking.status === 'completed' || 
                booking.status === 'cancelled' ||
                ((booking.status === 'confirmed' || booking.status === 'active') && !isOrderInFuture(booking))
            );

            // Sorteren blijft gelijk
            ordersList.sort((a, b) => parseDateTime(toDateKey(a.datetime), a.time) - parseDateTime(toDateKey(b.datetime), b.time));
            historyOrders.sort((a, b) => parseDateTime(toDateKey(b.datetime), b.time) - parseDateTime(toDateKey(a.datetime), a.time));
            newOrders.sort((a, b) => parseDateTime(toDateKey(a.datetime), a.time) - parseDateTime(toDateKey(b.datetime), b.time));
        }

        // ============================================
        // AGENDA FUNCTIES
        // ============================================
        function toDateKey(dateStr) {
            if (!dateStr) return '';
            const clean = dateStr.split(' ')[0];
            let parts = clean.split('-');
            if (parts.length === 3 && parts[0].length === 4) {
                // Inkomend is YYYY-DD-MM (dag en maand verwisseld)
                // Zet om naar DD-MM-YYYY
                return `${parts[1]}-${parts[2]}-${parts[0]}`;
            }
            return clean;
        }

        function getRidesByDate(dateStr) {
            const target = toDateKey(dateStr);
            return allBookings.filter(booking => toDateKey(booking.datetime) === target);
        }

        function getTodayStats() {
            const todayStr = `${NOW.getDate().toString().padStart(2,'0')}-${(NOW.getMonth()+1).toString().padStart(2,'0')}-${NOW.getFullYear()}`;
            const todayRides = getRidesByDate(todayStr);
            const todayCompleted = todayRides.filter(r => r.status === 'completed');
            const todayCanceled = todayRides.filter(r => r.status === 'cancelled');
            const todayCash = todayRides.filter(r => r.payment === 'Cash').reduce((sum, r) => sum + (r.amount || 0), 0);
            const todayFactuur = todayRides.filter(r => r.payment === 'Factuur').reduce((sum, r) => sum + (r.amount || 0), 0);
            const todayTotal = todayCash + todayFactuur;
            const commission = todayTotal * 0.10;
            
            const nowTime = `${NOW.getHours().toString().padStart(2,'0')}:${NOW.getMinutes().toString().padStart(2,'0')}`;
            const futureRidesToday = todayRides.filter(r => {
                if (r.status === 'completed' || r.status === 'cancelled') return false;
                return r.time > nowTime;
            });
            
            return {
                total: todayTotal,
                cash: todayCash,
                factuur: todayFactuur,
                commission: commission,
                completed: todayCompleted.length,
                canceled: todayCanceled.length,
                futureRides: futureRidesToday.length,
                totalRides: todayRides.length
            };
        }

        function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const firstDayOfMonth = new Date(year, month, 1);
            const startDay = firstDayOfMonth.getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const prevMonthDays = new Date(year, month, 0).getDate();
            
            let calendarHTML = `<div class="calendar-container"><div class="calendar-header"><h2>${firstDayOfMonth.toLocaleDateString('nl-NL', { month: 'long', year: 'numeric' })}</h2><div class="calendar-nav"><button onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button><button onclick="goToToday()">Vandaag</button><button onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button></div></div><div class="calendar-weekdays"><div>Ma</div><div>Di</div><div>Wo</div><div>Do</div><div>Vr</div><div>Za</div><div>Zo</div></div><div class="calendar-days">`;
            
            let adjustedStartDay = startDay === 0 ? 6 : startDay - 1;
            
            for (let i = adjustedStartDay - 1; i >= 0; i--) {
                const day = prevMonthDays - i;
                calendarHTML += `<div class="calendar-day other-month" onclick="selectDateByString('${day}-${month}-${year}')">${day}</div>`;
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${day.toString().padStart(2,'0')}-${(month+1).toString().padStart(2,'0')}-${year}`;
                const hasRides = getRidesByDate(dateStr).length > 0;
                const isToday = (day === NOW.getDate() && month === NOW.getMonth() && year === NOW.getFullYear());
                const isSelected = (selectedDate && day === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear());
                
                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                if (hasRides) classes += ' has-rides';
                
                calendarHTML += `<div class="${classes}" onclick="selectDateByString('${dateStr}')">${day}${hasRides ? '<div class="ride-dot"></div>' : ''}</div>`;
            }
            
            const remainingDays = 42 - (adjustedStartDay + daysInMonth);
            for (let day = 1; day <= remainingDays; day++) {
                calendarHTML += `<div class="calendar-day other-month" onclick="selectDateByString('${day}-${month+2}-${year}')">${day}</div>`;
            }
            
            calendarHTML += `</div></div>`;
            return calendarHTML;
        }

        }

        // ============================================
        // FINANCIEEL (vereenvoudigd maar werkt)
        // ============================================
        function renderFinance() {
            const totalRevenue = allBookings.reduce((sum, b) => sum + (b.amount || 0), 0);
            const cashRevenue = allBookings.filter(b => b.payment === 'Cash').reduce((sum, b) => sum + (b.amount || 0), 0);
            const factuurRevenue = allBookings.filter(b => b.payment === 'Factuur').reduce((sum, b) => sum + (b.amount || 0), 0);
            const commission = totalRevenue * 0.10;
            
            const html = `
                <div class="kpi-grid">
                    <div class="kpi-card"><div class="value">€ ${totalRevenue.toFixed(2)}</div><div class="label">Totale Omzet</div></div>
                    <div class="kpi-card"><div class="value">€ ${cashRevenue.toFixed(2)}</div><div class="label">Cash Betalingen</div></div>
                    <div class="kpi-card"><div class="value">€ ${factuurRevenue.toFixed(2)}</div><div class="label">Factuur Betalingen</div></div>
                    <div class="kpi-card"><div class="value">${allBookings.length}</div><div class="label">Aantal Ritten</div></div>
                    <div class="kpi-card"><div class="value">€ ${commission.toFixed(2)}</div><div class="label">10% Commissie</div></div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><h4>📋 New Orders</h4><div class="value">${newOrders.length}</div></div>

                    <div class="stat-card"><h4>📜 History</h4><div class="value">${historyOrders.length}</div></div>
                </div>
                <div class="finance-summary">
                    <h3>📋 Boekingen Overzicht</h3>
                    <div class="orders-table-wrapper">
                        <table class="orders-table">
                            <thead><tr><th>ID</th><th>Datum</th><th>Klant</th><th>Bedrag</th><th>Status</th></tr></thead>
                            <tbody>
                                ${allBookings.slice(0, 10).map(b => `
                                    <tr><td>${b.id}</span></td>
                                    <td>${b.datetime}</span></span></td>
                                    <td>${b.name}</span></span></td>
                                    <td>€${(b.amount || 0).toFixed(2)}</span></span></td>
                                    <td>${b.status || 'pending'}</span></span></td>
                                `).join('')}

                        </table>
                    </div>
                </div>
            `;
            document.getElementById('contentArea').innerHTML = html;
        }

        // ============================================
        // REFRESH & SWITCH TAB
        // ============================================
        async function refreshAllData() {
            await loadBookingsFromSupabase();
            await loadDriversFromSupabase();
            refreshCurrentTab();
        }

        function refreshCurrentTab() {
            if (currentTab === 'neworders') renderNewOrders();
            else if (currentTab === 'orders') renderOrders();
            else if (currentTab === 'history') renderHistory();
            else if (currentTab === 'agenda') refreshAgenda();
            else if (currentTab === 'drivers') renderDrivers();
            else if (currentTab === 'onderaannemers') renderOnderaannemers();
            else if (currentTab === 'financieel') renderFinance();
            else if (currentTab === 'wiki') renderWiki();
        }

        function switchTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.getAttribute('data-tab') === tabName) item.classList.add('active');
                else item.classList.remove('active');
            });
            
            const downloadButtons = document.getElementById('downloadButtons');
            if (tabName === 'history') downloadButtons.classList.remove('hidden');
            else downloadButtons.classList.add('hidden');
            
            refreshCurrentTab();
        }

        function downloadCSV() {
            const headers = ["ID", "Template", "Datum", "Tijd", "Naam", "Pickup", "Destination", "Bedrag", "Betaling", "Status"];
            const rows = historyOrders.map(b => [b.id, b.template, b.datetime, b.time, b.name, b.pickup, b.destination, b.amount, b.payment, b.status]);
            const csvContent = [headers, ...rows].map(row => row.map(cell => `"${cell || ''}"`).join(";")).join("\n");
            const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `fleet_history_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        function downloadJSON() {
            const blob = new Blob([JSON.stringify(historyOrders, null, 2)], { type: "application/json" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `fleet_history_${new Date().toISOString().slice(0,10)}.json`;
            link.click();
        }

        // ============================================
        // INITIALISATIE
        // ============================================
        async function init() {
            await initSupabase();
            setInterval(refreshAllData, 60000); // Auto-refresh elke 60 seconden
        }
        
        init();
    </script>
