<body>
    <div class="sidebar">

    <script>
        // ============================================
        // JOUW SUPABASE CONFIGURATIE
        // ============================================
        const SUPABASE_URL = 'https://kwsuqzbqzsmgkjaslwkz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3c3VxemJxenNtZ2tqYXNsd2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTUwMDQsImV4cCI6MjA5MjY5MTAwNH0.DBgx2oq0LbXwUlPQv3cmYMvGEjYA6bhy-2hejvgtERE';
        
        let supabaseClient = null;
        let supabaseConnected = false;
        let currentUser = null;

        async function initSupabase() {
            try {
                const { createClient } = supabaseJs;
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                // Check current session
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }
                
                currentUser = session.user;
                document.getElementById('userEmail').innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.email || currentUser.user_metadata?.full_name || 'Admin'}`;
                
                const { data, error } = await supabaseClient.from('bookings').select('count', { count: 'exact', head: true });
                if (!error) {
                    supabaseConnected = true;
                    console.log('Supabase connected successfully');
                } else {
                    supabaseConnected = false;
                }
            } catch (e) {
                supabaseConnected = false;
                console.error('Failed to initialize Supabase:', e);
                window.location.href = 'login.html';
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            localStorage.removeItem('supabase_session');
            window.location.href = 'login.html';
        }

        // ============================================
        // 1. CONFIGURATIE & HUIDIGE TIJD
        // ============================================
        const NOW = new Date(2026, 3, 26, 9, 18);
        
        function parseDateTime(dateStr, timeStr) {
            const parts = dateStr.split('-');
            const timeParts = timeStr ? timeStr.split(':') : ['00', '00'];
            return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]), parseInt(timeParts[0]), parseInt(timeParts[1]));
        }

        function isOrderInFuture(order) {
            const orderDateTime = parseDateTime(order.datetime, order.time);
            return orderDateTime > NOW;
        }

        // ============================================
        // 2. RAW DATA - ALLES LEEG
        // ============================================
        let rawNewOrders = [];
        let rawConfirmedOrders = [];
        let onderaannemersList = [];
        let driversList = [];

        // ============================================
        // 3. GLOBALE VARIABELEN
        // ============================================
        let allRides = [];
        let selectedDate = new Date(NOW);
        let isFlipped = false;
        let currentMonth = new Date(NOW);
        let flipStates = { omzet: false, cash: false, orders: false };
        let newOrders = [];
        let ordersList = [];
        let historyOrders = [];
        let currentTab = 'agenda';
        let currentSelectedOrder = null;
        let selectedDriverId = null;
        
        let financePeriod = 'month';
        let customStartDate = null;
        let customEndDate = null;
        let financeChart = null;

        // ============================================
        // 4. DATA FUNCTIES
        // ============================================
        function updateAgendaData() {
            allRides = [];
            rawConfirmedOrders.forEach(order => {
                allRides.push({
                    id: order.id, date: order.datetime, time: order.time, name: order.name,
                    pickup: order.pickup, destination: order.destination, vehicle: order.vehicle,
                    driver: order.assignedDriver, amount: order.amount, template: order.template,
                    completed: order.completed || false, canceled: order.canceled || false, payment: order.payment
                });
            });
        }

        function getRidesByDate(dateStr) {
            return allRides.filter(ride => ride.date === dateStr);
        }

        function filterAndSortData() {
            newOrders = rawNewOrders.filter(order => isOrderInFuture(order));
            ordersList = [];
            historyOrders = [];
            
            rawConfirmedOrders.forEach(order => {
                if (isOrderInFuture(order)) {
                    ordersList.push({ ...order });
                } else {
                    historyOrders.push({ ...order });
                }
            });
            
            ordersList.sort((a, b) => parseDateTime(a.datetime, a.time) - parseDateTime(b.datetime, b.time));
            historyOrders.sort((a, b) => parseDateTime(b.datetime, b.time) - parseDateTime(a.datetime, a.time));
        }

        // ============================================
        // 5. AGENDA FUNCTIES
        // ============================================
        function getTodayStats() {
            return { total: 0, cash: 0, factuur: 0, commission: 0, completed: 0, canceled: 0, futureRides: 0, totalRides: 0 };
        }

        function renderDashboardGrid() {
            const stats = getTodayStats();
            return `
                <div class="dashboard-grid">
                    <div class="info-card" onclick="toggleFlipCard('omzet')">
                        <div class="mini-flip-container">
                            <div class="mini-flip-card ${flipStates.omzet ? 'flipped' : ''}">
                                <div class="mini-flip-front"><i class="fas fa-euro-sign" style="font-size: 1.5rem;"></i><div class="value">€ 0,00</div><div class="label">Dagelijkse Omzet</div><div class="flip-hint"><i class="fas fa-sync-alt"></i> tik voor commissie</div></div>
                                <div class="mini-flip-back"><i class="fas fa-percent" style="font-size: 1.5rem;"></i><div class="value">€ 0,00</div><div class="label">10% Commissie</div><div class="flip-hint"><i class="fas fa-sync-alt"></i> tik terug</div></div>
                            </div>
                        </div>
                    </div>
                    <div class="info-card" onclick="toggleFlipCard('cash')">
                        <div class="mini-flip-container">
                            <div class="mini-flip-card ${flipStates.cash ? 'flipped' : ''}">
                                <div class="mini-flip-front"><i class="fas fa-money-bill-wave" style="font-size: 1.5rem;"></i><div class="value">€ 0,00</div><div class="label">Cash Betalingen</div><div class="flip-hint"><i class="fas fa-sync-alt"></i> tik voor factuur</div></div>
                                <div class="mini-flip-back"><i class="fas fa-file-invoice" style="font-size: 1.5rem;"></i><div class="value">€ 0,00</div><div class="label">Factuur Betalingen</div><div class="flip-hint"><i class="fas fa-sync-alt"></i> tik terug</div></div>
                            </div>
                        </div>
                    </div>
                    <div class="info-card" onclick="toggleFlipCard('orders')">
                        <div class="mini-flip-container">
                            <div class="mini-flip-card ${flipStates.orders ? 'flipped' : ''}">
                                <div class="mini-flip-front"><i class="fas fa-check-circle" style="font-size: 1.5rem;"></i><div class="value">0</div><div class="label">Uitgevoerde Orders</div><div class="flip-hint"><i class="fas fa-sync-alt"></i> tik voor annuleringen</div></div>
                                <div class="mini-flip-back"><i class="fas fa-ban" style="font-size: 1.5rem;"></i><div class="value">0</div><div class="label">Geannuleerde Ritten</div><div class="flip-hint"><i class="fas fa-sync-alt"></i> tik terug</div></div>
                            </div>
                        </div>
                    </div>
                    <div class="info-card"><div class="stat-card-simple"><i class="fas fa-clock" style="font-size: 1.5rem;"></i><div class="value">0</div><div class="label">Toekomstige ritten vandaag</div><div class="progress">Nog te rijden</div></div></div>
                </div>
            `;
        }

        function toggleFlipCard(cardName) { flipStates[cardName] = !flipStates[cardName]; refreshAgenda(); }

        function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const firstDayOfMonth = new Date(year, month, 1);
            const startDay = firstDayOfMonth.getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const prevMonthDays = new Date(year, month, 0).getDate();
            let calendarHTML = `<div class="calendar-container"><div class="calendar-header"><h2>${firstDayOfMonth.toLocaleDateString('nl-NL', { month: 'long', year: 'numeric' })}</h2><div class="calendar-nav"><button onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button><button onclick="goToToday()">Vandaag</button><button onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button></div></div><div class="calendar-weekdays"><div>Ma</div><div>Di</div><div>Wo</div><div>Do</div><div>Vr</div><div>Za</div><div>Zo</div></div><div class="calendar-days">`;
            let adjustedStartDay = startDay === 0 ? 6 : startDay - 1;
            for (let i = adjustedStartDay - 1; i >= 0; i--) { const day = prevMonthDays - i; calendarHTML += `<div class="calendar-day other-month" onclick="selectDateByString('${day}-${month}-${year}')">${day}</div>`; }
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${day}-${month+1}-${year}`;
                const hasRides = getRidesByDate(dateStr).length > 0;
                const isToday = (day === NOW.getDate() && month === NOW.getMonth() && year === NOW.getFullYear());
                const isSelected = (selectedDate && day === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear());
                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                if (hasRides) classes += ' has-rides';
                calendarHTML += `<div class="${classes}" onclick="selectDateByString('${dateStr}')">${day}${hasRides ? '<div class="ride-dot"></div>' : ''}</div>`;
            }
            const remainingDays = 42 - (adjustedStartDay + daysInMonth);
            for (let day = 1; day <= remainingDays; day++) { calendarHTML += `<div class="calendar-day other-month" onclick="selectDateByString('${day}-${month+2}-${year}')">${day}</div>`; }
            calendarHTML += `</div></div>`;
            return calendarHTML;
        }
        
        function renderPlanning() {
            const selectedDateStr = `${selectedDate.getDate()}-${selectedDate.getMonth()+1}-${selectedDate.getFullYear()}`;
            const rides = getRidesByDate(selectedDateStr);
            const formattedDate = selectedDate.toLocaleDateString('nl-NL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            let ridesHtml = rides.length === 0 ? '<div class="empty-planning"><i class="fas fa-calendar-day"></i> Geen ritten op deze dag</div>' : rides.map(ride => `<div class="planning-item"><div class="planning-time"><i class="fas fa-clock"></i> ${ride.time} uur</div><div class="planning-ride"><strong>${ride.name}</strong> - ${ride.pickup} → ${ride.destination}</div><div class="planning-ride"><i class="fas fa-car"></i> ${ride.vehicle}</div></div>`).join('');
            const futureRidesAll = allRides.filter(ride => { const rideDateTime = parseDateTime(ride.date, ride.time); return rideDateTime > NOW && !ride.completed && !ride.canceled; });
            let futureHtml = futureRidesAll.length === 0 ? '<div class="empty-planning"><i class="fas fa-calendar-plus"></i> Geen toekomstige ritten</div>' : futureRidesAll.sort((a,b) => parseDateTime(a.date,a.time) - parseDateTime(b.date,b.time)).map(ride => `<div class="planning-item"><div class="planning-time"><i class="fas fa-calendar-alt"></i> ${ride.date} om ${ride.time} uur</div><div class="planning-ride"><strong>${ride.name}</strong> - ${ride.pickup} → ${ride.destination}</div><div class="planning-ride"><i class="fas fa-car"></i> ${ride.vehicle}</div></div>`).join('');
            return `<div class="planning-container"><div class="flip-card ${isFlipped ? 'flipped' : ''}" id="flipCard"><div class="flip-card-inner"><div class="flip-card-front"><div class="flip-header"><h3><i class="fas fa-calendar-day"></i> ${formattedDate}</h3><button class="flip-btn" onclick="toggleFlip()"><i class="fas fa-sync-alt"></i> Toekomst</button></div><div class="planning-list">${ridesHtml}</div></div><div class="flip-card-back"><div class="flip-header"><h3><i class="fas fa-calendar-week"></i> Toekomstige ritten</h3><button class="flip-btn" onclick="toggleFlip()"><i class="fas fa-sync-alt"></i> Terug</button></div><div class="planning-list">${futureHtml}</div></div></div></div></div>`;
        }
        
        function refreshAgenda() {
            if (currentTab === 'agenda') document.getElementById('contentArea').innerHTML = `${renderDashboardGrid()}${renderCalendar()}${renderPlanning()}`;
        }
        
        function selectDateByString(dateStr) { const parts = dateStr.split('-'); selectedDate = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0])); isFlipped = false; refreshAgenda(); }
        function toggleFlip() { isFlipped = !isFlipped; refreshAgenda(); }
        function changeMonth(delta) { currentMonth.setMonth(currentMonth.getMonth() + delta); refreshAgenda(); }
        function goToToday() { currentMonth = new Date(NOW); selectedDate = new Date(NOW); isFlipped = false; refreshAgenda(); }

        // ============================================
        // 6. FINANCIËLE FUNCTIES (LEEG)
        // ============================================
        function getDateRange() { return { startDate: new Date(), endDate: new Date() }; }
        function getAllBookingsForFinance() { return []; }
        function getBookingsInRange() { return []; }
        function getPreviousPeriodData() { return { total: 0, cash: 0, factuur: 0, count: 0 }; }
        function getFinanceStatistics() { return { total: 0, cash: 0, factuur: 0, commission: 0, netRevenue: 0, byTemplate: { T1:0, T2:0, T3:0, T4:0, T5:0 }, avgOrderValue: 0, cashPercentage: 0, factuurPercentage: 0, count: 0 }; }
        function getChartData() { return { days: [], totals: [], cashData: [], factuurData: [] }; }
        function getOnderaannemerStats() { return []; }

        function renderFinance() {
            const periodNames = { day: 'Vandaag', week: 'Deze Week', month: 'Deze Maand', year: 'Dit Jaar', custom: 'Aangepaste periode' };
            const html = `<div class="finance-toolbar"><div class="period-buttons"><button class="period-btn ${financePeriod === 'day' ? 'active' : ''}" onclick="setFinancePeriod('day')">Dagelijks</button><button class="period-btn ${financePeriod === 'week' ? 'active' : ''}" onclick="setFinancePeriod('week')">Wekelijks</button><button class="period-btn ${financePeriod === 'month' ? 'active' : ''}" onclick="setFinancePeriod('month')">Maandelijks</button><button class="period-btn ${financePeriod === 'year' ? 'active' : ''}" onclick="setFinancePeriod('year')">Jaarlijks</button><button class="period-btn ${financePeriod === 'custom' ? 'active' : ''}" onclick="setFinancePeriod('custom')">Custom</button></div><div class="date-range-picker ${financePeriod !== 'custom' ? 'hidden' : ''}" id="customDateRange"><label>Van:</label><input type="date" id="startDate" onchange="updateCustomRange()"><label>Tot:</label><input type="date" id="endDate" onchange="updateCustomRange()"></div><div class="export-buttons"><button class="export-btn export-csv" onclick="exportFinanceCSV()">CSV</button><button class="export-btn export-json" onclick="exportFinanceJSON()">JSON</button><button class="export-btn export-pdf" onclick="exportFinancePDF()">PDF</button></div></div><div class="kpi-grid"><div class="kpi-card"><div class="icon">💰</div><div class="value">€ 0,00</div><div class="label">Totale Omzet</div></div><div class="kpi-card"><div class="icon">💵</div><div class="value">€ 0,00</div><div class="label">Cash Betalingen</div></div><div class="kpi-card"><div class="icon">📄</div><div class="value">€ 0,00</div><div class="label">Factuur Betalingen</div></div><div class="kpi-card"><div class="icon">📊</div><div class="value">0</div><div class="label">Aantal Ritten</div></div><div class="kpi-card"><div class="icon">⭐</div><div class="value">€ 0,00</div><div class="label">Gem. Ritwaarde</div></div></div><div class="stats-grid"><div class="stat-card"><h4>📈 10% Commissie</h4><div class="value">€ 0,00</div></div><div class="stat-card"><h4>🏦 Netto Omzet</h4><div class="value">€ 0,00</div></div><div class="stat-card"><h4>📊 Cash vs Factuur</h4><div class="value">0% / 0%</div></div></div><div class="chart-container"><h3>📈 Omzet Trend - ${periodNames[financePeriod]}</h3><canvas id="financeChart"></canvas></div><div class="comparison-card"><h3>📊 Vergelijking met vorige periode</h3><div class="comparison-grid"><div class="comparison-item"><div class="label">Omzet</div><div class="value">€ 0,00</div></div><div class="comparison-item"><div class="label">Cash</div><div class="value">€ 0,00</div></div><div class="comparison-item"><div class="label">Aantal Ritten</div><div class="value">0</div></div><div class="comparison-item"><div class="label">Gem. Ritwaarde</div><div class="value">€ 0,00</div></div></div></div><div class="finance-summary"><h3>📋 Omzet per Template</h3><div style="padding:10px 0;"><span><strong>T1-T5</strong></span><span>€ 0,00 (0%)</span></div></div><div class="finance-summary"><h3>🚗 Chauffeurs & Onderaannemers</h3><div class="orders-table-wrapper"><table class="orders-table"><thead><tr><th>Onderaannemer</th><th>Chauffeur</th><th>Voertuig</th><th>Ritten</th><th>Omzet</th></tr></thead><tbody><tr><td colspan="5" class="no-results">Geen chauffeurs</span></tr></tbody>}</div></div>`;
            document.getElementById('contentArea').innerHTML = html;
            setTimeout(() => { const ctx = document.getElementById('financeChart')?.getContext('2d'); if(ctx){ if(financeChart) financeChart.destroy(); financeChart = new Chart(ctx,{ type:'line', data:{ labels:[], datasets:[{ label:'Omzet', data:[], borderColor:'#2dd4bf' }] } }); } }, 100);
        }
        
        function setFinancePeriod(period) { financePeriod = period; renderFinance(); }
        function updateCustomRange() { renderFinance(); }
        function exportFinanceCSV() { alert('Geen data'); }
        function exportFinanceJSON() { alert('Geen data'); }
        function exportFinancePDF() { alert('PDF Export - gebruik Ctrl+P'); }

        // ============================================
        // 7. OVERIGE TABS (LEEG)
        // ============================================
        function renderNewOrders() { document.getElementById('contentArea').innerHTML = `<div class="orders-table-wrapper"><table class="orders-table"><thead><tr><th>Order ID</th><th>Datum</th><th>Naam</th><th>Route</th><th>Bedrag</th><th>Actie</th></tr></thead><tbody><tr><td colspan="6" class="no-results">Geen nieuwe orders</span></tbody>}</div>`; document.getElementById('pageTitle').innerHTML = 'New Orders <span class="order-count">0</span>'; }
        function renderOrders() { document.getElementById('contentArea').innerHTML = `<div class="orders-table-wrapper"><table class="orders-table"><thead><tr><th>Order ID</th><th>Datum</th><th>Naam</th><th>Route</th><th>Bedrag</th><th>Actie</th></tr></thead><tbody><tr><td colspan="6" class="no-results">Geen bevestigde orders</span></tbody>}</div>`; document.getElementById('pageTitle').innerHTML = 'Orders <span class="order-count">0</span>'; }
        function renderHistory() { document.getElementById('contentArea').innerHTML = `<div class="orders-table-wrapper"><table class="orders-table"><thead><tr><th>Order ID</th><th>Datum</th><th>Naam</th><th>Route</th><th>Bedrag</th></tr></thead><tbody><tr><td colspan="5" class="no-results">Geen historische ritten</span></tbody>}</div>`; document.getElementById('pageTitle').innerHTML = 'History <span class="order-count">0</span>'; document.getElementById('downloadButtons').classList.remove('hidden'); }
        function renderDrivers() { document.getElementById('contentArea').innerHTML = `<div class="people-card"><h3>Chauffeurs</h3><div class="empty-planning">Geen chauffeurs gevonden</div></div>`; }
        function renderOnderaannemers() { document.getElementById('contentArea').innerHTML = `<div class="people-card"><div style="display:flex;justify-content:space-between;"><h3>Onderaannemers</h3><button class="add-btn" onclick="addOnderaannemer()">Toevoegen</button></div><div class="empty-planning">Geen onderaannemers</div></div>`; }
        function renderWiki() { document.getElementById('contentArea').innerHTML = `<div class="wiki-container"><div class="wiki-empty"><i class="fas fa-robot"></i><h3>Wiki Agent</h3><p>Geen inhoud beschikbaar</p></div></div>`; }
        
        function addOnderaannemer() { alert('Demo: Onder aannemer toevoegen'); }
        function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }
        function downloadCSV() { alert('Geen geschiedenis om te downloaden'); }
        function downloadJSON() { alert('Geen geschiedenis om te downloaden'); }

        // ============================================
        // 8. SWITCH TAB
        // ============================================
        function switchTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.getAttribute('data-tab') === tabName) item.classList.add('active');
                else item.classList.remove('active');
            });
            const downloadButtons = document.getElementById('downloadButtons');
            if (tabName === 'history') downloadButtons.classList.remove('hidden');
            else downloadButtons.classList.add('hidden');
            
            if (tabName === 'neworders') renderNewOrders();
            else if (tabName === 'orders') renderOrders();
            else if (tabName === 'history') renderHistory();
            else if (tabName === 'agenda') refreshAgenda();
            else if (tabName === 'drivers') renderDrivers();
            else if (tabName === 'onderaannemers') renderOnderaannemers();
            else if (tabName === 'financieel') renderFinance();
            else if (tabName === 'wiki') renderWiki();
        }

        // ============================================
        // 9. INITIALISATIE
        // ============================================
        async function init() {
            await initSupabase();
            filterAndSortData();
            updateAgendaData();
            refreshAgenda();
            setInterval(() => { updateAgendaData(); filterAndSortData(); if(currentTab === 'agenda') refreshAgenda(); else if(['orders','history','neworders','financieel'].includes(currentTab)) switchTab(currentTab); }, 60000);
        }
        
        init();
    </script>
</body>
</html>
