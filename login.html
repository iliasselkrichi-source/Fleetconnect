<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Fleetconnect</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f1f5f9;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 360px;
            text-align: center;
        }
        h1 { font-size: 28px; margin-bottom: 8px; color: #0f172a; }
        p { color: #64748b; margin-bottom: 24px; }
        input {
            width: 100%;
            padding: 14px 20px;
            margin: 12px 0;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 15px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 12px;
        }
        button:hover {
            background: #2dd4bf;
            color: #0f172a;
        }
        .error { color: #ef4444; margin-top: 16px; font-size: 14px; }
        .success { color: #10b981; margin-top: 16px; font-size: 14px; }
    </style>
</head>
<body>
<div class="login-box">
    <h1>Fleetconnect Admin</h1>
    <p>Log in om het dashboard te openen</p>
    <input type="email" id="email" placeholder="E-mailadres">
    <input type="password" id="password" placeholder="Wachtwoord">
    <button onclick="login()">Inloggen</button>
    <div id="message"></div>
</div>

<script>
    // Supabase client aanmaken - zoals in de officiële documentatie
    // De library maakt een globale 'supabase' variabele beschikbaar.
    // Dit is de UMD-methode zoals beschreven op supabase.com/docs
    const supabase = supabase.createClient(
        'https://kwsuqzbqzsmgkjaslwkz.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3c3VxemJxenNtZ2tqYXNsd2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTUwMDQsImV4cCI6MjA5MjY5MTAwNH0.DBgx2oq0LbXwUlPQv3cmYMvGEjYA6bhy-2hejvgtERE'
    );

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const message = document.getElementById('message');
        
        message.innerHTML = '';
        
        // Inloggen met Supabase Auth
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        
        if (error) {
            message.innerHTML = '<span class="error">' + error.message + '</span>';
        } else {
            message.innerHTML = '<span class="success">✅ Succes! Doorverwijzen...</span>';
            window.location.href = 'admin_panel.html';
        }
    }
</script>
</body>
</html>
