<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Test Login</h2>
    <input type="text" id="email" placeholder="email" value="ryzen@fleetconnect.com" style="width:300px;padding:10px;"><br><br>
    <input type="password" id="password" placeholder="wachtwoord" style="width:300px;padding:10px;"><br><br>
    <button onclick="testLogin()">Inloggen</button>
    <pre id="result" style="margin-top:20px;background:#f0f0f0;padding:10px;"></pre>

    <script>
        const SUPABASE_URL = 'https://kwsuqzbqzsmgkjaslwkz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3c3VxemJxenNtZ2tqYXNsd2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTUwMDQsImV4cCI6MjA5MjY5MTAwNH0.DBgx2oq0LbXwUlPQv3cmYMvGEjYA6bhy-2hejvgtERE';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerText = 'Proberen in te loggen met: ' + email + '\n\n';
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                resultDiv.innerText += '❌ FOUT: ' + error.message;
            } else {
                resultDiv.innerText += '✅ SUCCES! User: ' + data.user.email + '\n\n✅ Je kunt nu door naar admin_panel.html';
            }
        }
    </script>
</body>
</html>
